services:
  postgres:
    image: postgres:15-alpine
    container_name: eka-postgres
    environment:
      POSTGRES_DB: ekadb
      POSTGRES_USER: ekauser
      POSTGRES_PASSWORD: ekapassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekauser -d ekadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eka-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  django-frontend:
    build:
      context: .
      dockerfile: services/django-frontend/Dockerfile
    container_name: eka-django
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - INGEST_SERVICE_URL=http://ingest-service:8200
      - QUERY_SERVICE_URL=http://query-service:8100
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/django-frontend/project:/app/project

  ingest-service:
    build:
      context: .
      dockerfile: services/fastapi-ingest/Dockerfile
    container_name: eka-ingest
    env_file: .env
    ports:
      - "8200:8200"
    volumes:
      - ./services/fastapi-ingest/app:/app/app
      - ./services/shared:/app/services/shared
    depends_on:
      - minio

  query-service:
    build:
      context: .
      dockerfile: services/fastapi-query/Dockerfile
    container_name: eka-query
    env_file: .env
    ports:
      - "8100:8100"
    volumes:
      - ./services/fastapi-query/app:/app/app
      - ./services/shared:/app/services/shared

volumes:
  postgres_data:
  minio_data: