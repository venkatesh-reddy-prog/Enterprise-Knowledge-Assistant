<!DOCTYPE html>
<html>
<head>
    <title>Enterprise Knowledge Assistant</title>
</head>
<body>
    <h1>Enterprise Knowledge Assistant 🔎</h1>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="query" placeholder="Ask company knowledge..." size="50">
        <button type="submit">Search</button>
    </form>

    {% if response %}
        <h3>AI Response:</h3>
        <p>{{ response }}</p>
    {% endif %}
</body>
</html>
